name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; skip queued runs, never cancel in-progress
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir _site
          cp index.html favicon.svg apple-touch-icon.png manifest.json robots.txt sitemap.xml _site/
          cp -r assets _site/assets

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_2.outputs.page_url || steps.deployment_3.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry 2
        if: steps.deployment.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (retry 2)
        id: deployment_2
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry 3
        if: steps.deployment.outcome == 'failure' && steps.deployment_2.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (retry 3)
        id: deployment_3
        if: steps.deployment.outcome == 'failure' && steps.deployment_2.outcome == 'failure'
        uses: actions/deploy-pages@v4
